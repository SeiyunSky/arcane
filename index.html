<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Arcane · Letters</title>
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/SeiyunSky/arcane@main/风格页3.webp" type="image/webp">
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/SeiyunSky/arcane@main/封面.webp" type="image/webp">
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Serif+SC:wght@300;400&family=Caveat:wght@400;600&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Serif+SC:wght@300;400&family=Caveat:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    :root { --bg-void: #07050f; }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; }
    body {
      background: var(--bg-void);
      display:flex; justify-content:center; align-items:center;
      user-select:none;
    }
    #particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

    /* ══════════════════════════════ 舞台 ══════════════════════════════ */
    #stage { width:100vw; height:100vh; position:relative; z-index:1; perspective:1400px; }

    /* ══════════════════════════════ 通用页面 ══════════════════════════════ */
    .page {
      position:absolute; inset:0;
      overflow:hidden;
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
    }
    .page.active { display:flex; }
    .fade-in  { animation: fadeIn  .4s ease both; }
    .slide-up { animation: slideUp .45s cubic-bezier(.2,0,.2,1) both; }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(5vh)} to{opacity:1;transform:translateY(0)} }

    /* ══ 进入信件：竖向条带从左到右 ══ */
    .letter-enter { animation: none; }
    #page-letter.letter-enter { animation: none; }
    #page-letter.letter-enter .letter-strip-cover {
      animation: stripReveal 2s cubic-bezier(.4,0,.2,1) both;
    }
    .letter-strip-cover {
      position:absolute; inset:0; z-index:50; pointer-events:none;
      display:flex;
    }
    .letter-strip-cover span {
      flex:1; background:#07050f;
      transform-origin:top center;
      animation: stripDrop 1.4s cubic-bezier(.4,0,.2,1) both;
    }
    .letter-strip-cover span:nth-child(1){animation-delay:.00s}
    .letter-strip-cover span:nth-child(2){animation-delay:.04s}
    .letter-strip-cover span:nth-child(3){animation-delay:.08s}
    .letter-strip-cover span:nth-child(4){animation-delay:.13s}
    .letter-strip-cover span:nth-child(5){animation-delay:.17s}
    .letter-strip-cover span:nth-child(6){animation-delay:.21s}
    .letter-strip-cover span:nth-child(7){animation-delay:.25s}
    .letter-strip-cover span:nth-child(8){animation-delay:.29s}
    @keyframes stripDrop {
      0%   { transform:scaleY(1); opacity:1; }
      60%  { transform:scaleY(1); opacity:1; }
      100% { transform:scaleY(0); opacity:0; }
    }
    /* ══ 印章解封 ══ */
    .seal-break { animation: sealBreak 2s ease-out both; }
    @keyframes sealBreak {
      0%  { transform:scale(1);   filter:drop-shadow(0 0 6px var(--sa,#9b6dff)); }
      40% { transform:scale(1.5); filter:drop-shadow(0 0 28px var(--sa,#9b6dff)) drop-shadow(0 0 48px rgba(79,195,247,0.8)); }
      100%{ transform:scale(1);   filter:drop-shadow(0 0 10px var(--sa,#9b6dff)); }
    }
    /* ══ 归档退出：Hextech 噪点消散 ══ */
    #hextech-flash {
      position:fixed; inset:0; z-index:999; pointer-events:none;
      opacity:0; background:repeating-linear-gradient(
        45deg,
        rgba(155,109,255,0.15) 0px, rgba(155,109,255,0.15) 1px,
        transparent 1px, transparent 6px
      ), repeating-linear-gradient(
        -45deg,
        rgba(79,195,247,0.1) 0px, rgba(79,195,247,0.1) 1px,
        transparent 1px, transparent 6px
      );
    }
    .hextech-out { animation: hextechOut 2s ease-out both; }
    @keyframes hextechOut {
      0%  { opacity:0; }
      25% { opacity:1; }
      60% { opacity:.6; }
      100%{ opacity:0; }
    }

    /* ══════════════════════════════ 封面页 ══════════════════════════════ */
    #page-cover {
      background: radial-gradient(ellipse at 50% 40%, #1a0d2e 0%, #07050f 70%);
      gap: clamp(16px, 4vh, 32px); cursor:pointer;
    }
    #page-cover::before {
      content:''; position:absolute; inset:0;
      background: url('https://cdn.jsdelivr.net/gh/SeiyunSky/arcane@main/风格页3.webp') center center / cover no-repeat;
      opacity:0.18; pointer-events:none; z-index:0;
    }

    .envelope-wrap { position:relative; z-index:1; }
    .envelope {
      width: clamp(180px, 55vw, 280px); height: clamp(128px, 38vw, 200px);
      position:relative;
      filter: drop-shadow(0 8px 32px rgba(120,60,200,0.5));
      transition: transform .4s cubic-bezier(.2,0,.2,1);
    }
    .envelope-wrap:hover .envelope { transform: translateY(-6px) scale(1.02); }

    .env-body {
      position:absolute; inset:0;
      background: url('https://cdn.jsdelivr.net/gh/SeiyunSky/arcane@main/封面.webp') center center / cover no-repeat;
      border-radius:4px; border:1px solid rgba(155,109,255,0.25);
      opacity:0.5;
    }
    .env-flap-bottom, .env-flap-top { display:none; }

    .env-seal-cover {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width: clamp(36px, 10vw, 56px); height: clamp(36px, 10vw, 56px);
      z-index:2;
    }
    .env-seal-cover svg { width:100%; height:100%; filter:drop-shadow(0 0 8px rgba(155,109,255,0.7)); }
    .seal-pulse { animation: sealPulse 2.5s ease-in-out infinite; }
    @keyframes sealPulse {
      0%,100%{ filter:drop-shadow(0 0 6px rgba(155,109,255,0.5)); }
      50%    { filter:drop-shadow(0 0 16px rgba(155,109,255,1)); }
    }

    .cover-title {
      font-family:'Cinzel',serif; color:#c9a0ff;
      font-size: clamp(16px, 5vw, 24px); letter-spacing: clamp(3px, 1.5vw, 8px);
      text-shadow:0 0 20px rgba(155,109,255,0.7); z-index:1;
    }
    .cover-sub {
      color:#9b6dff; font-size: clamp(11px, 3.2vw, 15px); letter-spacing: clamp(3px, 1.5vw, 8px);
      z-index:1; text-shadow:0 0 12px rgba(155,109,255,0.6);
      animation: coverSubGlow 3s ease-in-out infinite;
    }
    @keyframes coverSubGlow {
      0%,100%{ opacity:.7; letter-spacing:clamp(3px,1.5vw,8px); }
      50%{ opacity:1; letter-spacing:clamp(5px,2vw,12px); text-shadow:0 0 20px rgba(155,109,255,0.9),0 0 40px rgba(79,195,247,0.4); }
    }
    .cover-hint {
      color:#c9a0ff; font-size: clamp(11px, 3.2vw, 14px); letter-spacing: clamp(3px, 1.2vw, 6px);
      z-index:1; position:relative;
      text-shadow:0 0 10px rgba(155,109,255,0.8);
      animation: hintPulse 2s ease-in-out infinite;
    }
    .cover-hint::before, .cover-hint::after {
      content:''; position:absolute; top:50%; height:1px; width:clamp(16px,4vw,28px);
      background:linear-gradient(90deg,transparent,#9b6dff);
      transform:translateY(-50%);
    }
    .cover-hint::before { right:100%; margin-right:8px; }
    .cover-hint::after  { left:100%;  margin-left:8px; background:linear-gradient(90deg,#9b6dff,transparent); }
    @keyframes hintPulse {
      0%,100%{ opacity:.5; transform:scale(1); }
      50%{ opacity:1; transform:scale(1.05); text-shadow:0 0 18px rgba(155,109,255,1),0 0 32px rgba(79,195,247,0.5); }
    }

    /* ══════════════════════════════ 信件列表页 ══════════════════════════════ */
    #page-list {
      background: radial-gradient(ellipse at 50% 20%, #12091e 0%, #07050f 70%);
      justify-content:flex-start; padding:0;
    }
    #page-list::before {
      content:''; position:absolute; inset:0;
      opacity:0.15; pointer-events:none; z-index:0;
    }
    .list-header {
      position:absolute; top: clamp(28px, 6vh, 52px); left:0; right:0;
      text-align:center; z-index:2; pointer-events:none;
    }
    .list-title {
      font-family:'Cinzel',serif; color:#9b6dff;
      font-size: clamp(11px, 3.5vw, 16px); letter-spacing: clamp(3px, 1.2vw, 6px);
      text-shadow:0 0 10px rgba(155,109,255,0.5);
    }
    .list-line { width:80px; height:1px; margin:8px auto 0; background:linear-gradient(90deg,transparent,#3a2860,transparent); }

    #letter-list { position:absolute; inset:0; }

    .letter-card {
      width: clamp(260px, 88vw, 420px); padding: clamp(10px, 3vw, 16px) clamp(10px, 3vw, 18px);
      border-radius:6px;
      border:1px solid rgba(255,255,255,0.07);
      cursor:pointer; position:absolute; overflow:hidden;
      display:flex; align-items:center; gap: clamp(8px, 2vw, 14px);
      transform: rotate(var(--rot)) translate(var(--tx), var(--ty));
      transition: transform .25s cubic-bezier(.2,0,.2,1), box-shadow .25s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .letter-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0;
      width:3px; background:var(--accent); box-shadow:0 0 8px var(--accent);
    }
    .letter-card:active {
      transform: rotate(calc(var(--rot) * 0.3)) translateY(-4px) scale(1.04);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 0 16px var(--accent);
      z-index:5; animation-play-state:paused;
    }
    .letter-card::after {
      content:''; position:absolute; top:-100%; left:-60%; width:40%; height:300%;
      background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.05) 50%,transparent 60%);
      transition:transform .4s;
    }
    .letter-card:active::after { transform:translateX(400%); }

    /* ══════════════════════════════ 信件阅读页 ══════════════════════════════ */
    #page-letter { padding:0; justify-content:flex-start; background: var(--letter-bg, #12080e); }

    .letter-header {
      width:100%; padding: clamp(16px, 3vh, 28px) clamp(16px, 5vw, 28px) clamp(12px, 2vh, 18px);
      position:relative; flex-shrink:0;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .letter-header-bg { position:absolute; inset:0; background:var(--letter-header-bg, rgba(0,0,0,0.3)); pointer-events:none; }
    .letter-header-line { position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--letter-accent),transparent); }
    .letter-seal-large { width: clamp(40px, 12vw, 58px); height: clamp(40px, 12vw, 58px); margin:0 auto clamp(6px, 1.5vh, 12px); display:block; }
    .letter-seal-large svg { width:100%; height:100%; filter:drop-shadow(0 0 10px var(--letter-accent)); }
    .letter-from-to { text-align:center; }
    .letter-sender {
      font-family:'Cinzel',serif;
      font-size: clamp(13px, 4vw, 18px); color:var(--letter-accent);
      letter-spacing:3px; text-shadow:0 0 10px var(--letter-accent);
    }
    .letter-arrow-to { color:#3a2860; font-size: clamp(10px, 2.5vw, 13px); margin:4px 0; }
    .letter-receiver { font-size: clamp(11px, 3vw, 14px); color:#a07cc5; letter-spacing:2px; }

    .letter-scroll {
      flex:1; width:100%; overflow-y:auto;
      padding: clamp(16px, 3vh, 28px) clamp(20px, 6vw, 32px) clamp(60px, 12vh, 90px);
      -webkit-overflow-scrolling:touch;
    }
    .letter-scroll.typing { overflow-y:hidden; }
    .letter-scroll::-webkit-scrollbar { width:3px; }
    .letter-scroll::-webkit-scrollbar-track { background:transparent; }
    .letter-scroll::-webkit-scrollbar-thumb { background:rgba(155,109,255,0.2); border-radius:2px; }

    .letter-body {
      font-family:'Caveat','Noto Serif SC',cursive;
      font-size: clamp(14px, 4.2vw, 20px); line-height:2.2; color:var(--letter-ink);
      white-space:pre-wrap; word-break:break-word; position:relative;
    }
    .letter-body::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(180deg,transparent,transparent calc(2.2em - 1px),rgba(255,255,255,0.03) calc(2.2em - 1px),rgba(255,255,255,0.03) 2.2em);
    }

    .letter-footer {
      position:absolute; bottom: clamp(10px, 2vh, 20px); left:0; right:0;
      padding: clamp(8px, 1.5vh, 14px) clamp(16px, 5vw, 28px);
      display:flex; justify-content:space-between; align-items:center;
      background:linear-gradient(0deg, var(--letter-bg,#12080e) 60%, transparent);
      z-index:5;
    }
    .btn-close-letter {
      color:#c9a0ff; font-size: clamp(11px, 3vw, 14px); letter-spacing:2px;
      cursor:pointer; transition:color .2s;
      padding: clamp(4px, 1vw, 8px) clamp(10px, 3vw, 16px);
      border:1px solid rgba(155,109,255,0.3); border-radius:4px; background:rgba(155,109,255,0.08);
    }
    .btn-close-letter:active { color:#e8d0ff; border-color:rgba(155,109,255,0.6); background:rgba(155,109,255,0.15); }
    .letter-page-num { color:#2a1e40; font-size: clamp(9px, 2.5vw, 12px); letter-spacing:1px; }

    /* ══════════════════════════════ 结尾页 ══════════════════════════════ */
    #page-ending {
      background: radial-gradient(ellipse at 50% 50%, #12091e 0%, #07050f 70%);
    }
    #page-ending::before {
      content:''; position:absolute; inset:0;
      opacity:0.5; pointer-events:none; z-index:0;
    }

    /* ══ 台词水印 ══ */
    .quote-layer { position:absolute; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .quote-line {
      position:absolute; white-space:nowrap;
      font-family:'Cinzel',serif; letter-spacing:.15em;
      color:rgba(200,160,255,0.45); font-size:clamp(10px,2.4vw,14.3px);
      animation: quoteAppear var(--dur,7s) ease-in-out both;
    }
    @keyframes quoteAppear {
      0%   { opacity:0; }
      15%  { opacity:1; }
      75%  { opacity:.8; }
      100% { opacity:0; }
    }

    /* 主页：信封漂浮 */
    .envelope-wrap { animation: envFloat 5s ease-in-out infinite; }
    @keyframes envFloat {
      0%,100%{ transform:translateY(0px) rotate(0deg); }
      40%    { transform:translateY(-10px) rotate(.6deg); }
      70%    { transform:translateY(-5px) rotate(-.4deg); }
    }
    /* 主页：背景光晕流动 */
    #page-cover::after {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(155,109,255,0.08) 0%, transparent 70%);
      animation: coverAura 8s ease-in-out infinite;
    }
    @keyframes coverAura {
      0%,100%{ transform:scale(1) translateY(0);   opacity:.6; }
      50%    { transform:scale(1.15) translateY(-3%); opacity:1; }
    }
    /* 主页：Hextech 能量水波（JS驱动，随机位置） */
    #page-cover .cover-sweep {
      position:absolute; inset:0; pointer-events:none; z-index:0;
    }
    .hex-ripple-circle {
      position:absolute; border-radius:50%; transform:translate(-50%,-50%);
      border:2px solid rgba(155,109,255,0.3);
      animation: hexRipple var(--rd,10s) ease-out both;
    }
    @keyframes hexRipple {
      0%  { width:60px;  height:60px;  opacity:.85; }
      100%{ width:160vw; height:160vw; opacity:0; }
    }

    /* 列表页：卡片浮动（奇偶错开） */
    .letter-card:nth-child(odd)  { animation: cardFloat1 6s ease-in-out infinite; }
    .letter-card:nth-child(even) { animation: cardFloat2 7s ease-in-out infinite; }
    @keyframes cardFloat1 {
      0%,100%{ transform:rotate(var(--rot)) translateY(0px); }
      50%    { transform:rotate(var(--rot)) translateY(-6px); }
    }
    @keyframes cardFloat2 {
      0%,100%{ transform:rotate(var(--rot)) translateY(0px); }
      50%    { transform:rotate(var(--rot)) translateY(-9px); }
    }
    /* 列表页：卡片左侧色条呼吸 */
    .letter-card::before { animation: accentBreath 4s ease-in-out infinite; }
    @keyframes accentBreath {
      0%,100%{ box-shadow:0 0 6px var(--accent); opacity:.7; }
      50%    { box-shadow:0 0 16px var(--accent),0 0 32px var(--accent); opacity:1; }
    }
    /* 列表页：背景粒子扫光 */
    #page-list::after {
      content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
      background:linear-gradient(180deg,rgba(155,109,255,0.04) 0%,transparent 40%,transparent 60%,rgba(79,195,247,0.03) 100%);
      animation: listScan 12s linear infinite;
    }
    @keyframes listScan {
      0%  { background-position:0 -100%; }
      100%{ background-position:0 200%; }
    }

    /* 信件页：纸面微光 */
    .letter-body::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.015) 50%,transparent 70%);
      animation: paperSheen 10s ease-in-out infinite;
    }
    @keyframes paperSheen {
      0%,100%{ transform:translateX(-100%); opacity:0; }
      40%    { opacity:1; }
      60%    { transform:translateX(200%); opacity:0; }
    }
    /* 信件页：印章持续呼吸 */
    .letter-seal-large { animation: sealBreathe 4s ease-in-out infinite; }
    @keyframes sealBreathe {
      0%,100%{ filter:drop-shadow(0 0 6px var(--letter-accent,#9b6dff)); }
      50%    { filter:drop-shadow(0 0 18px var(--letter-accent,#9b6dff)) drop-shadow(0 0 32px rgba(79,195,247,0.4)); }
    }
    /* 信件页：header 底部光线脉冲 */
    .letter-header-line { animation: headerLinePulse 5s ease-in-out infinite; }
    @keyframes headerLinePulse {
      0%,100%{ opacity:.5; }
      50%    { opacity:1; box-shadow:0 0 8px var(--letter-accent,#9b6dff); }
    }
    #music-btn {
      position:fixed; top: clamp(10px, 2vh, 18px); right: clamp(10px, 3vw, 18px);
      width: clamp(30px, 9vw, 40px); height: clamp(30px, 9vw, 40px); border-radius:50%;
      background:rgba(12,8,20,0.9); border:1px solid #1a1230;
      color:#3a2860; cursor:pointer; font-size: clamp(12px, 3.5vw, 16px);
      display:flex; align-items:center; justify-content:center;
      z-index:100; transition:border-color .2s,color .2s,box-shadow .2s;
    }
    #music-btn.on { border-color:#9b6dff; color:#9b6dff; box-shadow:0 0 10px rgba(155,109,255,0.4); }

    /* ══ 加载页 ══ */
    #loading-screen {
      position:fixed; inset:0; z-index:9999;
      background:radial-gradient(ellipse at 50% 40%,#1a0d2e 0%,#07050f 70%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:clamp(12px,3vh,22px);
      transition:opacity .6s ease;
      overflow:hidden;
    }
    #loading-screen.fade-out { opacity:0; pointer-events:none; }
    /* 背景：Hextech 网格 */
    #loading-screen::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:
        linear-gradient(rgba(155,109,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(155,109,255,0.04) 1px, transparent 1px);
      background-size:clamp(30px,8vw,50px) clamp(30px,8vw,50px);
      animation:gridDrift 8s linear infinite;
    }
    @keyframes gridDrift { 0%{transform:translateY(0)} 100%{transform:translateY(clamp(30px,8vw,50px))} }
    /* 背景：电弧闪烁 */
    .load-arc {
      position:absolute; width:1px; background:linear-gradient(180deg,transparent,#9b6dff,#4fc3f7,transparent);
      opacity:0; animation:arcFlash var(--ad,2s) ease-in-out infinite;
    }
    @keyframes arcFlash {
      0%,85%,100%{opacity:0;transform:scaleY(0.3)}
      90%{opacity:.8;transform:scaleY(1)}
      93%{opacity:.3;transform:scaleY(1)}
    }
    /* Hex 徽章 */
    .loading-hex {
      width:clamp(48px,14vw,68px); height:clamp(48px,14vw,68px);
      position:relative; z-index:1;
      animation:loadHexSpin 4s linear infinite;
    }
    .loading-hex svg { width:100%; height:100%; filter:drop-shadow(0 0 16px rgba(155,109,255,0.7)); }
    .loading-hex::after {
      content:''; position:absolute; inset:-40%; border-radius:50%;
      border:1px solid rgba(155,109,255,0.15);
      animation:hexRing 3s ease-in-out infinite;
    }
    @keyframes loadHexSpin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    @keyframes hexRing { 0%,100%{transform:scale(.8);opacity:.3} 50%{transform:scale(1.2);opacity:.8} }
    /* 主文字 */
    .loading-text {
      font-family:'Cinzel',serif; color:#c9a0ff; position:relative; z-index:1;
      font-size:clamp(13px,3.8vw,18px); letter-spacing:clamp(3px,1.5vw,8px);
      text-shadow:0 0 20px rgba(155,109,255,0.8);

      <rect x="14" y="36" width="24" height="5" rx="2" fill="rgba(200,80,20,0.5)" stroke="#e07840" stroke-width="0.8"/>
    </svg>`,
    body: `Powder，\n\n我总是在怀念。怀念那些失去的。\n\n你记得吗？我们那时总说范德尔的坏话——说他没胆子闯荡，说他对谁都一副讨好的样子。我们蜗居在地下城，嫌它闭塞，聊上城，聊梦想。我说我一定会带你走，带范德尔，带小不点，带所有人，去一个更远、更好的地方。\n\n我装出一副势在必得的样子，好像头顶不是摇摇欲坠的破烂木板，而是已经实现了的愿景。\n\n其实我只是期待你看我的目光——那种如炬的、不自觉的、发自内心的笑容。那让我觉得你需要我。让我觉得我是你的姐姐，不只是一个满嘴空话的人。\n\n后来的事你都知道了。范德尔倒在血泊里，你消失在硝烟中。我被丢进那个不见天日的地方，日子就靠数墙上的裂缝来过。每一道裂缝里都住着一句我没说出口的话。我以为来日方长，却不知那一眼已是诀别。\n\n再见到你的时候，我几乎没有认出你。不是你变了——是你眼睛里那团火，从取暖的变成了烧人的。你笑起来的弧度一模一样，可那弧度里盛放的东西，我再也读不懂了。我张了张嘴，你的名字卡在喉头，像一枚生了锈的钥匙，再也拧不开从前的门。\n\n你不必认我。但我会认你。哪怕你把自己拆碎了重新拼，哪怕你换了名字、换了阵营、换了整个世界的敌我，我也能从千万人里一眼将你找到。因为你是我妹妹。这件事不需要你同意。\n\n那个更远更好的地方，我至今仍欠着你一程。\n\n我需要你。\n\n——你的姐姐\n   Vi`,

// ══════════════════════════════════════
// 页面切换
// ══════════════════════════════════════
let currentLetter = null;
function goTo(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active','fade-in','slide-up','letter-enter'));
  const t = document.getElementById('page-' + pageId);
  t.classList.add('active', pageId === 'letter' ? 'letter-enter' : 'fade-in');
  if (pageId === 'letter' && currentLetter && currentLetter.bgm) {
    const bgm = document.getElementById('bgm');
    if (bgm.getAttribute('data-src') !== currentLetter.bgm) {
      bgm.setAttribute('data-src', currentLetter.bgm);
      bgm.src = currentLetter.bgm;
      if (musicOn) bgm.play().catch(()=>{});
    }
  }
}

function closeLetterAnim() {
  clearInterval(window._typeTimer);
  document.querySelector('.letter-scroll').classList.remove('typing');
  const flash = document.getElementById('hextech-flash');
  flash.classList.remove('hextech-out');
  void flash.offsetWidth;
  flash.classList.add('hextech-out');
  setTimeout(() => goTo('list'), 720);
}

// ══════════════════════════════════════
// 渲染列表（百分比定位）
// ══════════════════════════════════════
function renderList() {
  const el = document.getElementById('letter-list');
  const layout = [
    { top:'15%', left:'4%',  rot:'-3.5deg' },
    { top:'32%', left:'10%', rot:'2.8deg' },
    { top:'49%', left:'2%',  rot:'-1.8deg' },
    { top:'66%', left:'8%',  rot:'3.2deg' },
  ];
  const bgPosY = ['15%','33%','55%','75%'];
  const fonts = [
    'font-family:Caveat,cursive; font-size:clamp(20px,6.5vw,32px); font-weight:600;',
    'font-family:Caveat,cursive; font-size:clamp(18px,6vw,30px); font-weight:600;',
    'font-family:Caveat,cursive; font-size:clamp(22px,7vw,34px); font-weight:600;',
    'font-family:Caveat,cursive; font-size:clamp(18px,6vw,30px); font-weight:600;',
  ];
  el.innerHTML = letters.map((l, i) => `
    <div class="letter-card"
         style="--accent:${l.accent};--rot:${layout[i].rot};--tx:0px;--ty:0px;
                background:${l.bg};top:${layout[i].top};left:${layout[i].left};"
         onclick="openLetter(${i})">
      <div class="card-bg-lazy" style="position:absolute;inset:0;background-size:cover;background-position:center ${bgPosY[i]};opacity:0.3;pointer-events:none;border-radius:6px;"></div>
      <div style="position:relative;z-index:1;width:100%;text-align:center;color:${l.accent};${fonts[i]}text-shadow:0 0 12px ${l.accent};">${l.from}</div>
    </div>`).join('');

  // Lway卡片位置
  const lway = document.getElementById('lway-card');
  lway.style.top = '83%';
  lway.style.left = '14%';
  lway.style.width = 'clamp(180px,58vw,280px)';
}

// ══════════════════════════════════════
// 打开信件
// ══════════════════════════════════════
function openLetter(i) {
  const l = letters[i];
  currentLetter = l;
  const page = document.getElementById('page-letter');
  page.style.setProperty('--letter-bg', l.bg);
  page.style.setProperty('--letter-accent', l.accent);
  page.style.setProperty('--letter-ink', l.ink);
  page.style.background = l.bg;
  document.getElementById('letter-bg-img').style.backgroundImage = l.bgImg ? `url('${l.bgImg}')` : 'none';
  document.getElementById('letter-header-bg').style.background = l.headerBg;
  document.getElementById('letter-header-line').style.background = `linear-gradient(90deg,transparent,${l.accent},transparent)`;
  const sealEl = document.getElementById('letter-seal-large');
  sealEl.innerHTML = l.seal;
  sealEl.style.setProperty('--sa', l.accent);
  sealEl.classList.remove('seal-break');
  void sealEl.offsetWidth;
  sealEl.classList.add('seal-break');
  setTimeout(() => sealEl.classList.remove('seal-break'), 2000);
  document.getElementById('letter-sender').style.color = l.accent;
  document.getElementById('letter-sender').style.textShadow = `0 0 10px ${l.accent}`;
  document.getElementById('letter-sender').textContent = l.from;
  document.getElementById('letter-receiver').textContent = l.to;
  document.getElementById('letter-body').textContent = '';
  document.getElementById('letter-body').style.color = l.ink;
  document.getElementById('letter-page-num').textContent = `${i+1} / ${letters.length}`;
  const scrollEl = document.querySelector('.letter-scroll');
  scrollEl.scrollTop = 0;
  scrollEl.classList.add('typing');
  // 重置条带动效
  const strips = document.querySelectorAll('.letter-strip-cover span');
  strips.forEach(s => { s.style.animation='none'; void s.offsetWidth; s.style.animation=''; });
  goTo('letter');
  // 逐字打字效果
  clearInterval(window._typeTimer);
  const bodyEl = document.getElementById('letter-body');
  const fullText = l.body;
  let ci = 0;
  const speed = 45; // ms per char
  window._typeTimer = setInterval(() => {
    if (ci < fullText.length) {
      bodyEl.textContent += fullText[ci];
      ci++;
      // 自动滚动到底部
      scrollEl.scrollTop = scrollEl.scrollHeight;
    } else {
      clearInterval(window._typeTimer);
      // 打字完成，解锁滚动
      scrollEl.classList.remove('typing');
    }
  }, speed);
}

let musicOn = true;
const bgm = document.getElementById('bgm');
bgm.volume = 0.5;

function startBgm() {
  if (bgm.src && bgm.src !== location.href) return;
  bgm.src = 'Ma Meilleure Ennemie-Stromae&Pomme.mp3';
  bgm.currentTime = 34;
  bgm.play().catch(() => {

// 加载页：首页图加载完 + 最少2秒后淡出
// ══════════════════════════════════════
const _loadStart = Date.now();
function dismissLoading() {
  const elapsed = Date.now() - _loadStart;
  const wait = Math.max(0, 2000 - elapsed);
  setTimeout(() => {
    const ls = document.getElementById('loading-screen');
    if (!ls) return;
    ls.classList.add('fade-out');
    setTimeout(() => ls.remove(), 600);

}

function loadImg(url) {
  return new Promise(r => { const i = new Image(); i.onload = i.onerror = r; i.src = url; });
}
function injectBg(id, url) {
  const el = document.getElementById(id);
  if (el) el.style.backgroundImage = `url('${url}')`;
}

// ══════════════════════════════════════
// 六边形粒子
// ══════════════════════════════════════
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const pts = Array.from({length:24}, () => ({
    x:Math.random()*1400-100, y:Math.random()*900,
    r:Math.random()*5+2,
    vx:(Math.random()-.5)*.2, vy:(Math.random()-.5)*.2,
    a:Math.random()*.12+.03,
    c:Math.random()>.5?'#9b6dff':'#4fc3f7',
  }));
  function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
  addEventListener('resize', resize); resize();
  function hex(x,y,r){
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=Math.PI/180*(60*i-30);
      i?ctx.lineTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx.moveTo(x+r*Math.cos(a),y+r*Math.sin(a));
    }
    ctx.closePath();
  }
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-20)p.x=W+20; if(p.x>W+20)p.x=-20;
      if(p.y<-20)p.y=H+20; if(p.y>H+20)p.y=-20;
      hex(p.x,p.y,p.r);
      ctx.strokeStyle=p.c; ctx.globalAlpha=p.a; ctx.lineWidth=0.8; ctx.stroke();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  })();
})();

// 台词水印层（随机出现渐弱消失）
// ══════════════════════════════════════
const QUOTES = [
  "The truth won't set you free.",
  "The people who love you will hurt you the most.",
  "Nothing's fair in this city.",
  "She's not your little girl anymore.",
  "We're the ones who have to carry it.",
  "I just wanted to be your sister.",
  "Power only yields to power.",
  "You were the best of us.",
  "Progress... at what cost?",
  "We're done being afraid.",
  "Is there anything so undoing as a daughter?",
  "What could be more terrifying than change?",
  "In the pursuit of great, we failed to do good.",
  "Sisters. Apart. Together.",
  "I've seen what you've become.",
  "Nobody wins in war.",
  "Oil and water, that's us.",
  "The monster I've created.",
  "When people look up at you, they see hope.",
  "Loneliness is a slow poison.",
];
const quoteLayers = [];
function buildQuoteLayer(pageEl) {
  const layer = document.createElement('div');
  layer.className = 'quote-layer';
  pageEl.appendChild(layer);
  quoteLayers.push(layer);
}
let _quoteIdx = 0;
function spawnQuote() {
  const count = 1 + Math.floor(Math.random() * 3); // 1~3个
  quoteLayers.forEach(layer => {
    if (!layer.closest('.page.active')) return;
    for (let n = 0; n < count; n++) {
      const el = document.createElement('div');
      el.className = 'quote-line';
      el.textContent = QUOTES[_quoteIdx % QUOTES.length];
      _quoteIdx++;
      const dur = 5 + Math.random() * 5;
      // 避开中间区域：top 8~38% 或 62~88%，left 0~30% 或 50~80%
      const top = Math.random() < .5 ? 8+Math.random()*30 : 62+Math.random()*26;
      const left = Math.random() < .5 ? Math.random()*30 : 50+Math.random()*30;
      el.style.cssText = `top:${top}%;left:${left}%;--dur:${dur}s;`;
      layer.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 100);
    }
  });
}
setInterval(spawnQuote, 3100);

// ══════════════════════════════════════
// 封面水波（随机位置，随机间隔）
// ══════════════════════════════════════
const rippleColors = [
  'rgba(155,109,255,0.32)', 'rgba(120,90,220,0.26)',
  'rgba(79,195,247,0.22)',  'rgba(155,109,255,0.28)', 'rgba(79,195,247,0.18)'
];
const rippleWidths = ['3px','2px','2.5px','2px','1.5px'];
let _rippleIdx = 0;
function spawnRipple() {
  const sweep = document.getElementById('cover-sweep');
  if (!sweep) return;
  const ci = _rippleIdx % rippleColors.length;
  _rippleIdx++;
  const el = document.createElement('div');
  el.className = 'hex-ripple-circle';
  const dur = 9 + Math.random() * 5;
  // 起始中心：在屏幕中心附近随机偏移，但不超出信封位置
  const cx = 35 + Math.random() * 30; // 35%~65%
  const cy = 30 + Math.random() * 25; // 30%~55%（在信封下方区域之下）
  el.style.cssText = `left:${cx}%;top:${cy}%;border-width:${rippleWidths[ci]};border-color:${rippleColors[ci]};--rd:${dur}s;`;
  sweep.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000 + 100);
  // 下一次随机间隔：4s ~ 9s
  setTimeout(spawnRipple, 4000 + Math.random() * 5000);
}
spawnRipple();

renderList();
['page-cover','page-list','page-letter','page-ending'].forEach(id => {
  buildQuoteLayer(document.getElementById(id));
});
spawnQuote();
